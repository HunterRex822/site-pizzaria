<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzaria Elite</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body{margin:0;font-family:'Segoe UI';color:#fff;background:#0b0b0b}
body::before{content:"";position:fixed;width:100%;height:100%;background:url('https://images.unsplash.com/photo-1513104890138-7c749659a591') center/cover;opacity:0.15;z-index:-1}
header{position:sticky;top:0;background:#000;padding:15px;display:flex;justify-content:space-between;align-items:center;color:gold}
header nav a{color:white;margin:0 10px;text-decoration:none}
.container{padding:20px}
.fade-slide{animation:fadeSlide 0.8s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
input,button{padding:12px;margin:6px;border:none;border-radius:8px;width:90%}
button{background:gold;color:#000;cursor:pointer;transition:.3s}
button:hover{transform:scale(1.05)}
#login{max-width:400px;margin:80px auto;background:rgba(0,0,0,0.8);padding:30px;border-radius:15px;box-shadow:0 0 20px rgba(255,215,0,0.6);text-align:center}
.card{background:#1a1a1a;padding:15px;margin:10px;border-radius:15px;box-shadow:0 0 10px rgba(255,215,0,0.3);transition:.3s;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);transition:0.5s}
.card:hover::before{left:100%}
.card:hover{transform:translateY(-5px)}
.hidden{display:none}
.products{display:flex;flex-wrap:wrap;justify-content:center}
.product{width:230px;text-align:center}
.product img{width:100%;height:150px;object-fit:cover;border-radius:10px}
.cart{position:fixed;right:-260px;top:0;width:260px;height:100%;background:#000;padding:10px;overflow:auto;transition:0.4s}
.cart.open{right:0}
.cart-btn{position:fixed;top:50%;right:0;background:gold;color:black;padding:10px;cursor:pointer;border-radius:10px 0 0 10px}
.social{text-align:center}
.social i{margin:15px;font-size:28px;color:gold}
.whatsapp{position:fixed;bottom:20px;right:20px;display:flex;gap:10px}
.whatsapp i{background:#25D366;color:white;width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:18px;box-shadow:0 0 10px rgba(0,0,0,0.5);cursor:pointer}
.whatsapp i.instagram{background:#E1306C}
iframe{width:100%;height:200px;border:0;margin-top:10px}
@media(max-width:768px){.products{flex-direction:column;align-items:center}.cart{width:100%}}
</style>
</head>
<body>
<header>
<div>Pizzaria Elite</div>
<nav>
<a href="#">Início</a>
<a href="#">Cardápio</a>
<a href="#">Contato</a>
</nav>
</header>
<div id="login" class="fade-slide">
<h2>Bem-vindo</h2>
<input type="text" placeholder="Usuário" id="loginUser">
<input type="password" placeholder="Senha" id="loginPass">
<br>
<button onclick="login()">Entrar</button>
<p onclick="showCadastro()">Criar conta</p>
</div>
<div id="cadastro" class="container hidden fade-slide">
<h2>Cadastro</h2>
<input type="text" placeholder="Usuário" id="cadUser">
<input type="password" placeholder="Senha" id="cadPass">
<button onclick="cadastrar()">Cadastrar</button>
</div>
<div id="main" class="container hidden fade-slide">
<h2>Cardápio Premium</h2>
<div class="products" id="products"></div>
<h3>Localização</h3>
<iframe src="https://maps.google.com/maps?q=sao%20paulo&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
<div class="social">
<i class="fab fa-instagram"></i>
<i class="fab fa-whatsapp"></i>
</div>
<h3>Pagamento</h3>
<button onclick="pagar()">Finalizar Compra</button>
</div>
<div class="cart" id="cart">
<h3>Carrinho</h3>
<ul id="cartItems"></ul>
<p>Total: R$ <span id="total">0</span></p>
</div>
<div class="cart-btn" onclick="toggleCart()">🛒</div>
<div class="whatsapp">
<i class="fab fa-whatsapp"></i>
<i class="fab fa-instagram instagram"></i>
</div>
<script>
let cart = [];
let produtos = [
{name:"Pizza Trufada", preco:89, img:"https://images.unsplash.com/photo-1628840042765-356cda07504e"},
{name:"Pizza Ouro", preco:120, img:"https://images.unsplash.com/photo-1594007654729-407eedc4be65"},
{name:"porçoes Premium", preco:95, img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{name:"Pizza Italiana", preco:70, img:"https://images.unsplash.com/photo-1604382354936-07c5d9983bd3"},
{name:"hamburguer Supreme", preco:110, img:"https://images.unsplash.com/photo-1571091718767-18b5b1457add"}
];
function toggleCart(){document.getElementById("cart").classList.toggle("open")}
function showCadastro(){document.getElementById("login").classList.add("hidden");document.getElementById("cadastro").classList.remove("hidden")}
function cadastrar(){alert("Conta criada!");location.reload()}
function login(){if(loginUser.value&&loginPass.value){document.getElementById("login").classList.add("hidden");document.getElementById("main").classList.remove("hidden");renderProdutos()}else alert("Digite qualquer usuário e senha")}
function renderProdutos(){let div=document.getElementById("products");div.innerHTML="";produtos.forEach((p,i)=>{div.innerHTML+=`<div class="card product fade-slide"><img src="${p.img}"><h4>${p.name}</h4><p>R$ ${p.preco}</p><button onclick="addCart(${i})">Comprar</button></div>`})}
function addCart(i){cart.push(produtos[i]);renderCart()}
function renderCart(){let list=document.getElementById("cartItems");list.innerHTML="";let total=0;cart.forEach(p=>{list.innerHTML+=`<li>${p.name} - R$ ${p.preco}</li>`;total+=p.preco});document.getElementById("total").innerText=total}
function pagar(){if(cart.length===0){alert("Carrinho vazio");return}alert("Compra realizada!");cart=[];renderCart()}
</script>
</body>
</html>
